<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <color-profile>
        <stop offset="0%" stop-color="#121214" />
        <stop offset="100%" stop-color="#0a0a0c" />
      </color-profile>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0c0c0e" />
  
  <!-- Outer Glow Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#glowGrad)" stroke-width="4" opacity="0.15" />
  
  <!-- Relay Symbol -->
  <g transform="translate(106, 106)" filter="url(#glow)">
    <!-- Path connecting nodes -->
    <path d="M 75 75 C 225 75, 75 225, 225 225" fill="none" stroke="url(#glowGrad)" stroke-width="24" stroke-linecap="round" stroke-dasharray="1 30" />
    <path d="M 75 75 C 225 75, 75 225, 225 225" fill="none" stroke="url(#glowGrad)" stroke-width="20" stroke-linecap="round" opacity="0.3" />
    <path d="M 75 75 C 225 75, 75 225, 225 225" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.7" />

    <!-- Node 1 (Source) -->
    <circle cx="75" cy="75" r="40" fill="#0c0c0e" stroke="url(#glowGrad)" stroke-width="12" />
    <circle cx="75" cy="75" r="16" fill="#00f2fe" />

    <!-- Node 2 (Destination) -->
    <circle cx="225" cy="225" r="40" fill="#0c0c0e" stroke="url(#glowGrad)" stroke-width="12" />
    <circle cx="225" cy="225" r="16" fill="#4facfe" />
  </g>
</svg>
